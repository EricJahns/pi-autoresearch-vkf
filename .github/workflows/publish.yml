name: Publish to npm

# Publishes the package when a version tag (e.g. v0.5.0) is pushed.
# One-time setup: create an npm "Automation" access token
# (npmjs.com → Access Tokens) and add it to this repo as the secret NPM_TOKEN
# (Settings → Secrets and variables → Actions).

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run typecheck
      - name: Publish if this version is new
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "pi-autoresearch-vkf@${VERSION}" version >/dev/null 2>&1; then
            echo "pi-autoresearch-vkf@${VERSION} is already on npm — skipping publish."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
